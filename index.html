<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Board | Creative Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --primary-gradient: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
            --accent-1: #FF6B6B;
            --accent-2: #4ECDC4;
            --accent-3: #FFE66D;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .board-container {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            padding: 40px;
            position: relative;
            overflow: visible; /* Changed to show floating elements */
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo & Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 8px;
        }

        .logo-icon {
            background: var(--primary-gradient);
            padding: 10px;
            border-radius: 15px;
            color: white;
            box-shadow: 0 4px 15px rgba(231, 60, 126, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.8rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
        }

        /* Stats Pill */
        .stats-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .stats-pill {
            background: rgba(255, 255, 255, 0.4);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .stats-pill b {
            color: #784BA0;
            font-weight: 700;
        }

        /* Input Area Enhancements */
        .input-wrapper {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-wrap: wrap;
            border: 2px solid transparent;
            background-image: linear-gradient(white, white), var(--primary-gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .input-wrapper:focus-within {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .field-container {
            display: flex;
            flex: 1;
            min-width: 250px;
            align-items: center;
            position: relative;
        }

        select, input {
            border: none;
            padding: 12px;
            font-size: 1rem;
            outline: none;
            background: transparent;
            font-family: inherit;
        }

        select {
            border-right: 1px solid #f0f0f0;
            margin-right: 10px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            width: 160px;
        }

        input {
            flex: 1;
            padding-right: 45px; /* Space for clear button */
        }

        .clear-btn {
            position: absolute;
            right: 5px;
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: none; /* Shown via JS */
            transition: all 0.2s;
        }

        .clear-btn:hover {
            color: var(--accent-1);
            background: rgba(255,107,107,0.1);
            transform: scale(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .add-btn {
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            padding: 0 20px;
            height: 48px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn:hover {
            box-shadow: 0 8px 20px rgba(120, 75, 160, 0.4);
            transform: translateY(-2px);
        }

        /* Ideas Grid */
        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .idea-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 24px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            border-top: 6px solid transparent;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .idea-card:hover {
            transform: translateY(-12px) rotate(1deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .card-text {
            font-size: 1.15rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f8f9fa;
            padding-top: 18px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 36px;
            height: 36px;
            background: #eee;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .author-name {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            color: #ccd1d1;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #f1f3f4;
            color: var(--text-dark);
        }

        .icon-btn.liked { color: #FF3CAC; }
        .icon-btn.liked svg { fill: #FF3CAC; }

        /* Empty State */
        .empty-zone {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            color: rgba(255,255,255,0.7);
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: var(--radius-lg);
        }

        @media (max-width: 650px) {
            h1 { font-size: 2.2rem; }
            .input-wrapper { flex-direction: column; }
            select { width: 100%; border-right: none; border-bottom: 1px solid #f0f0f0; margin: 0; }
            .add-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="board-container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="lightbulb" size="32"></i>
                </div>
                <h1>Dream Board</h1>
            </div>
            <p class="subtitle">Capture your creative sparks in the clouds</p>
            
            <div class="stats-wrapper">
                <div class="stats-pill">
                    <i data-lucide="bar-chart-2" size="14"></i>
                    Total Ideas: <b id="totalCount">0</b>
                </div>
            </div>
        </header>

        <div class="input-wrapper">
            <select id="userInput">
                <option value="" disabled selected>Who are you?</option>
                <option value="Udith Manusha">Udith Manusha</option>
                <option value="Mehnaz Haq">Mehnaz Haq</option>
                <option value="Aditha Jagodage">Aditha Jagodage</option>
                <option value="Gayantha Rashmika">Gayantha Rashmika</option>
                <option value="Teshan Lakshitha">Teshan Lakshitha</option>
                <option value="Chamod Denuwan">Chamod Denuwan</option>
                <option value="Binasha Perera">Binasha Perera</option>
                <option value="Savidya Oshadi">Savidya Oshadi</option>    
            </select>
            <div class="field-container">
                <input type="text" id="ideaInput" placeholder="Write your next big idea..." maxlength="120">
                <button class="clear-btn" id="clearBtn" title="Clear text">
                    <i data-lucide="x-circle" size="20"></i>
                </button>
            </div>
            <button class="add-btn" id="addBtn">
                <i data-lucide="sparkles"></i>
                Add Idea
            </button>
        </div>

        <div class="ideas-grid" id="grid">
            <div class="empty-zone" id="emptyState">
                <i data-lucide="nebula" size="48" style="margin-bottom:20px; opacity:0.6;"></i>
                <p>No ideas have landed yet. Be the first to launch one!</p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF3CAC', '#2B86C5', '#A29BFE'];
        const input = document.getElementById('ideaInput');
        const userSelect = document.getElementById('userInput');
        const btn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const grid = document.getElementById('grid');
        const empty = document.getElementById('emptyState');
        const countDisplay = document.getElementById('totalCount');

        let totalIdeas = 0;

        // Toggle clear button visibility
        input.addEventListener('input', () => {
            clearBtn.style.display = input.value.length > 0 ? 'block' : 'none';
        });

        // Clear input logic
        clearBtn.addEventListener('click', () => {
            input.value = '';
            input.focus();
            clearBtn.style.display = 'none';
        });

        function updateCount(delta) {
            totalIdeas += delta;
            countDisplay.innerText = totalIdeas;
            
            // Subtle pop animation for the counter
            countDisplay.parentElement.style.transform = 'scale(1.1)';
            setTimeout(() => {
                countDisplay.parentElement.style.transform = 'scale(1)';
            }, 200);
        }

        function addCard(text, user) {
            if(empty.style.display !== 'none') empty.style.display = 'none';

            const card = document.createElement('div');
            card.className = 'idea-card';
            
            // Random vibrant accent color
            const accent = colors[Math.floor(Math.random() * colors.length)];
            card.style.borderTopColor = accent;

            const initials = user.slice(0, 2).toUpperCase();

            card.innerHTML = `
                <p class="card-text">"${text}"</p>
                <div class="card-footer">
                    <div class="author-info">
                        <div class="author-avatar" style="background:${accent}15; color:${accent}">${initials}</div>
                        <span class="author-name">by ${user}</span>
                    </div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="this.classList.toggle('liked')" title="Vote">
                            <i data-lucide="heart" size="18"></i>
                        </button>
                        <button class="icon-btn" onclick="removeCard(this)" title="Remove">
                            <i data-lucide="trash-2" size="18"></i>
                        </button>
                    </div>
                </div>
            `;
            
            grid.insertBefore(card, grid.firstChild);
            lucide.createIcons();
            updateCount(1);
        }

        window.removeCard = function(btn) {
            const card = btn.closest('.idea-card');
            card.style.transform = 'scale(0.8) translateY(20px)';
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                updateCount(-1);
                if(totalIdeas === 0) empty.style.display = 'block';
            }, 400);
        };

        btn.addEventListener('click', () => {
            const text = input.value.trim();
            const user = userSelect.value;
            
            if(text && user) {
                addCard(text, user);
                input.value = '';
                clearBtn.style.display = 'none';
                input.focus();
            } else {
                // Creative error feedback (shake)
                const container = document.querySelector('.input-wrapper');
                container.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });

        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
